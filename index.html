<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小球滚动</title>
  </head>
  <body>
    <div class="circle" id="circle">
      <!-- 小球将通过 JavaScript 动态生成 -->
    </div>

    <div class="controls">
      <label for="ballCount">小球数量：</label>
      <input type="range" id="ballCount" min="1" max="12" value="1">
      <span class="ball-count" id="ballCountDisplay">1</span>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
